<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>grocerylk - YouTube Short</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.container{position:relative;width:100%;height:100dvh;max-width:100%;margin:0 auto;overflow:hidden;background:#07070a;display:flex;align-items:center;justify-content:center}
@supports(height:100svh){.container{height:100svh}}

.gradient-bg{position:absolute;inset:0;background:radial-gradient(ellipse 120% 60% at 30% 10%,rgba(0,168,107,0.1) 0%,transparent 60%),radial-gradient(ellipse 100% 50% at 70% 90%,rgba(0,168,107,0.06) 0%,transparent 50%),radial-gradient(ellipse 80% 50% at 50% 50%,rgba(0,80,180,0.04) 0%,transparent 50%);animation:gradientShift 10s ease-in-out infinite alternate}
.gradient-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 30% at 50% 0%,rgba(0,168,107,0.04) 0%,transparent 100%);animation:gradientPulse 6s ease-in-out infinite alternate}
@keyframes gradientShift{0%{opacity:0.5;transform:scale(1) translate(0,0)}100%{opacity:1;transform:scale(1.08) translate(-1%,-1%)}}
@keyframes gradientPulse{0%{opacity:0.3}100%{opacity:0.8}}

.scene-wrapper{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(24px,6vw,60px);opacity:0;transition:opacity 0.55s ease,transform 0.55s ease;transform:scale(0.97);pointer-events:none;will-change:opacity,transform}
.scene.active{opacity:1;transform:scale(1);pointer-events:auto}
.scene-content{opacity:0;transform:translateY(24px);transition:opacity 0.5s ease 0.15s,transform 0.5s ease 0.15s}
.scene.active .scene-content{opacity:1;transform:translateY(0)}

/* Scene 1 */
.scene-1 .scene-content{text-align:center;max-width:680px;padding:0 16px}
.scene-1 h1{font-size:clamp(1.8rem,5.5vw,3rem);font-weight:700;color:#fff;line-height:1.3;letter-spacing:-0.02em}
.scene-1 .em-dash{color:#00a86b;font-weight:300;display:inline-block;animation:emDashPulse 3s ease-in-out infinite}
@keyframes emDashPulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* Scene 2 */
.scene-2 .scene-content{display:flex;align-items:center;justify-content:center}
.phone-frame{width:clamp(220px,32vw,340px);height:clamp(400px,58vw,620px);background:#0c0c12;border-radius:clamp(28px,4vw,44px);border:2px solid #1e1e2a;padding:clamp(12px,1.8vw,20px);position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.03);overflow:hidden;flex-shrink:0}
.phone-notch{width:35%;height:clamp(18px,2.2vw,26px);background:#000;border-radius:0 0 14px 14px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10}
.phone-notch::after{content:'';width:clamp(6px,0.7vw,8px);height:clamp(6px,0.7vw,8px);background:#1a1a24;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.phone-home{width:clamp(80px,12vw,130px);height:4px;background:#222;border-radius:4px;position:absolute;bottom:clamp(6px,1vw,10px);left:50%;transform:translateX(-50%);z-index:10}
.phone-status{display:flex;align-items:center;justify-content:space-between;padding:clamp(4px,0.6vw,8px) clamp(2px,0.4vw,6px) clamp(8px,1.2vw,14px);margin-top:clamp(2px,0.3vw,4px)}
.phone-status .time{font-size:clamp(0.6rem,0.9vw,0.75rem);color:#888;font-weight:600;letter-spacing:0.5px}
.phone-status .icons{display:flex;align-items:center;gap:clamp(3px,0.4vw,6px)}
.phone-status .icons span{display:inline-block;width:clamp(10px,1.2vw,14px);height:clamp(6px,0.7vw,8px);border:1.5px solid #666;border-radius:2px;position:relative}
.phone-status .icons span::after{content:'';position:absolute;top:1px;left:1px;right:1px;bottom:1px;background:#666;border-radius:1px}
.phone-header{text-align:center;padding:clamp(8px,1.2vw,14px) 0;border-bottom:1px solid #16161f;margin-bottom:clamp(8px,1.2vw,14px)}
.phone-header .label{font-size:clamp(0.55rem,0.8vw,0.7rem);color:#555;font-weight:500;letter-spacing:0.8px;text-transform:uppercase}
.phone-header .search-query{font-size:clamp(0.85rem,1.4vw,1.15rem);color:#fff;font-weight:600;margin-top:clamp(2px,0.3vw,4px);display:flex;align-items:center;justify-content:center;gap:clamp(4px,0.6vw,8px)}
.phone-header .search-query .q-icon{font-size:clamp(0.65rem,1vw,0.85rem)}
.price-list{display:flex;flex-direction:column;gap:clamp(5px,0.7vw,9px);padding:0 clamp(2px,0.3vw,4px)}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:clamp(8px,1.1vw,14px) clamp(10px,1.4vw,16px);background:#12121a;border-radius:clamp(8px,1.1vw,12px);transition:transform 0.2s}
.price-item .store-info{display:flex;align-items:center;gap:clamp(6px,0.8vw,10px)}
.store-dot{width:clamp(7px,0.9vw,10px);height:clamp(7px,0.9vw,10px);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(255,255,255,0.05)}
.store-name{font-size:clamp(0.7rem,1.1vw,0.9rem);color:#ccc;font-weight:500}
.price-value{font-size:clamp(0.8rem,1.3vw,1.05rem);color:#fff;font-weight:700}
.price-value .curr{font-size:clamp(0.55rem,0.8vw,0.7rem);color:#666;font-weight:400;margin-right:1px}
.best-tag{position:relative}
.best-tag::after{content:'Best';position:absolute;top:clamp(-5px,-0.6vw,-3px);right:clamp(-28px,-3.5vw,-22px);font-size:clamp(0.45rem,0.6vw,0.55rem);color:#00a86b;font-weight:600;background:rgba(0,168,107,0.12);padding:1px clamp(4px,0.5vw,6px);border-radius:4px;letter-spacing:0.3px}

/* Scene 3 */
.scene-3 .scene-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(16px,2.5vw,32px)}
.scene-3 .check-wrap{position:relative;width:clamp(60px,9vw,90px);height:clamp(60px,9vw,90px);margin-bottom:clamp(4px,0.5vw,8px)}
.scene-3 .check-svg{width:100%;height:100%;transform:rotate(-90deg)}
.scene-3 .check-bg{fill:none;stroke:#1a1a24;stroke-width:4}
.scene-3 .check-fg{fill:none;stroke:#00a86b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:125.6;stroke-dashoffset:125.6;transition:stroke-dashoffset 0.7s ease 0.2s}
.scene-3.active .check-fg{stroke-dashoffset:0}
.scene-3 .check-mark{position:absolute;bottom:clamp(16px,2.5vw,26px);left:50%;transform:translateX(-50%) scale(0);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.65s}
.scene-3.active .check-mark{transform:translateX(-50%) scale(1)}
.scene-3 .check-mark svg{width:clamp(20px,3vw,30px);height:clamp(20px,3vw,30px)}
.scene-3 .check-mark path{fill:none;stroke:#00a86b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
.scene-3 .main-text{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;color:#fff;line-height:1.35;letter-spacing:-0.01em}
.scene-3 .main-text .hl{color:#00a86b}
.scene-3 .sub-text{font-size:clamp(0.85rem,1.5vw,1.1rem);color:#666;font-weight:400;letter-spacing:0.2px}

/* Scene 4 */
.scene-4 .scene-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(12px,1.8vw,24px)}
.scene-4 .url-text{font-size:clamp(1.8rem,5.5vw,3rem);font-weight:800;color:#00a86b;letter-spacing:-0.03em;line-height:1.1;text-shadow:0 0 20px rgba(0,168,107,0.15),0 0 40px rgba(0,168,107,0.08);animation:urlGlow 2.5s ease-in-out infinite alternate;word-break:break-all}
@keyframes urlGlow{0%{text-shadow:0 0 15px rgba(0,168,107,0.2),0 0 30px rgba(0,168,107,0.08)}100%{text-shadow:0 0 25px rgba(0,168,107,0.5),0 0 50px rgba(0,168,107,0.25),0 0 80px rgba(0,168,107,0.1)}}
.scene-4 .url-sub{font-size:clamp(0.8rem,1.5vw,1.1rem);color:#555;font-weight:400;letter-spacing:0.3px}
.scene-4 .url-sub .accent{color:#00a86b;font-weight:500;position:relative}
.scene-4 .url-sub .accent::after{content:'\2022';margin:0 clamp(4px,0.6vw,8px);color:#333}
.scene-4 .url-sub .accent:last-child::after{display:none}

.progress-bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;gap:4px;padding:10px 10px 0}
.progress-bar .seg{flex:1;height:3px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.progress-bar .seg .fill{height:100%;width:0%;background:#fff;border-radius:3px;transition:width 0.1s linear}
.progress-bar .seg.past .fill{width:100%;background:rgba(255,255,255,0.5)}
.progress-bar .seg.future .fill{width:0%}
.progress-bar .seg.active .fill{background:#fff}

.watermark{position:absolute;bottom:clamp(16px,2.5vw,36px);left:0;right:0;text-align:center;z-index:5;font-size:clamp(0.5rem,0.7vw,0.6rem);color:rgba(255,255,255,0.08);letter-spacing:2px;text-transform:uppercase;font-weight:400}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="gradient-bg"></div>

  <div class="progress-bar" id="progressBar">
    <div class="seg" data-i="0"><div class="fill"></div></div>
    <div class="seg" data-i="1"><div class="fill"></div></div>
    <div class="seg" data-i="2"><div class="fill"></div></div>
    <div class="seg" data-i="3"><div class="fill"></div></div>
  </div>

  <div class="scene-wrapper">
    <!-- Scene 1 -->
    <div class="scene scene-1" data-scene="0">
      <div class="scene-content">
        <h1>Tired of checking 6 stores for the best price?</h1>
      </div>
    </div>

    <!-- Scene 2 -->
    <div class="scene scene-2" data-scene="1">
      <div class="scene-content">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-home"></div>
          <div class="phone-status">
            <span class="time">9:41</span>
            <div class="icons"><span></span></div>
          </div>
          <div class="phone-header">
            <div class="label">Search results</div>
            <div class="search-query"><span class="q-icon">&#x1F50D;</span> Rice 1kg</div>
          </div>
          <div class="price-list">
            <div class="price-item best-tag">
              <div class="store-info">
                <span class="store-dot" style="background:#E53E3E"></span>
                <span class="store-name">SPAR</span>
              </div>
              <span class="price-value"><span class="curr">Rs</span>1,100</span>
            </div>
            <div class="price-item">
              <div class="store-info">
                <span class="store-dot" style="background:#DD6B20"></span>
                <span class="store-name">Kapruka</span>
              </div>
              <span class="price-value"><span class="curr">Rs</span>1,150</span>
            </div>
            <div class="price-item">
              <div class="store-info">
                <span class="store-dot" style="background:#3182CE"></span>
                <span class="store-name">Cargills</span>
              </div>
              <span class="price-value"><span class="curr">Rs</span>1,280</span>
            </div>
            <div class="price-item">
              <div class="store-info">
                <span class="store-dot" style="background:#805AD5"></span>
                <span class="store-name">Glomark</span>
              </div>
              <span class="price-value"><span class="curr">Rs</span>1,350</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scene 3 -->
    <div class="scene scene-3" data-scene="2">
      <div class="scene-content">
        <div class="check-wrap">
          <svg class="check-svg" viewBox="0 0 48 48">
            <circle class="check-bg" cx="24" cy="24" r="20"/>
            <circle class="check-fg" cx="24" cy="24" r="20"/>
          </svg>
          <div class="check-mark">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M6 13l4 4 8-8"/>
            </svg>
          </div>
        </div>
        <div class="main-text">One search.<br>All stores.<br><span class="hl">Side by side.</span></div>
        <div class="sub-text">Find the lowest price instantly</div>
      </div>
    </div>

    <!-- Scene 4 -->
    <div class="scene scene-4" data-scene="3">
      <div class="scene-content">
        <div class="url-text">grocerylk.vercel.app</div>
        <div class="url-sub">
          <span class="accent">Free</span>
          <span class="accent">No App</span>
          <span class="accent">No Sign-up</span>
        </div>
      </div>
    </div>
  </div>

  <div class="watermark">grocerylk &mdash; Price Comparison</div>
</div>

<script>
(function(){
  const TOTAL = 4;
  const DURATION = 3000;
  const scenes = document.querySelectorAll('.scene');
  const segs = document.querySelectorAll('.seg');
  let current = 0;
  let running = true;

  function update(index) {
    scenes.forEach((s, i) => {
      s.classList.toggle('active', i === index);
    });
    segs.forEach((seg, i) => {
      seg.classList.toggle('past', i < index);
      seg.classList.toggle('active', i === index);
      seg.classList.toggle('future', i > index);
      const fill = seg.querySelector('.fill');
      if (i < index) fill.style.width = '100%';
      else if (i > index) fill.style.width = '0%';
    });
  }

  function animateBar(progress) {
    const fill = segs[current].querySelector('.fill');
    fill.style.width = Math.min(progress, 100) + '%';
  }

  update(0);

  const startTime = performance.now();

  function tick(now) {
    if (!running) return;
    const elapsed = now - startTime;
    const totalCycle = TOTAL * DURATION;
    const cyclePos = elapsed % totalCycle;
    const sceneIndex = Math.floor(cyclePos / DURATION);
    const sceneProgress = ((cyclePos % DURATION) / DURATION) * 100;

    if (sceneIndex !== current) {
      current = sceneIndex;
      update(current);
    }
    animateBar(sceneProgress);

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
